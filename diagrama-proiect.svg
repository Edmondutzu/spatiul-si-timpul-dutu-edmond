<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Hartă interdisciplinară a proiectului</title>
  <desc id="desc">Diagrama leagă măsurarea fenomenelor, viața și societatea, sensul și valorile de tema spațiului și timpului.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop stop-color="#eef4ff"/><stop offset="1" stop-color="#eafaf7"/></linearGradient>
    <linearGradient id="c" x1="0" x2="1"><stop stop-color="#2454d6"/><stop offset="1" stop-color="#0f8b8d"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#132033" flood-opacity="0.14"/></filter>
  </defs>
  <rect x="0" y="0" width="980" height="420" rx="32" fill="url(#bg)"/>
  <g stroke="#b9c7dc" stroke-width="2" opacity=".8">
    <path d="M490 210 C360 120,260 115,150 132" fill="none"/>
    <path d="M490 210 C635 110,735 120,835 132" fill="none"/>
    <path d="M490 210 C360 292,260 300,150 288" fill="none"/>
    <path d="M490 210 C635 305,735 300,835 288" fill="none"/>
  </g>
  <circle cx="490" cy="210" r="92" fill="url(#c)" filter="url(#shadow)"/>
  <text x="490" y="196" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="white">Spațiul</text>
  <text x="490" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="white">și timpul</text>
  <g font-family="Arial, sans-serif" font-size="20" fill="#132033" font-weight="700">
    <g filter="url(#shadow)"><rect x="48" y="82" width="250" height="95" rx="22" fill="white"/><text x="173" y="120" text-anchor="middle">Măsurarea</text><text x="173" y="148" text-anchor="middle" fill="#5a6b80" font-size="16">Fizică • Chimie • IA</text></g>
    <g filter="url(#shadow)"><rect x="682" y="82" width="250" height="95" rx="22" fill="white"/><text x="807" y="120" text-anchor="middle">Viața și societatea</text><text x="807" y="148" text-anchor="middle" fill="#5a6b80" font-size="16">Biologie • Istorie • Geografie</text></g>
    <g filter="url(#shadow)"><rect x="48" y="242" width="250" height="95" rx="22" fill="white"/><text x="173" y="280" text-anchor="middle">Sensul</text><text x="173" y="308" text-anchor="middle" fill="#5a6b80" font-size="16">Filosofie • Religie</text></g>
    <g filter="url(#shadow)"><rect x="682" y="242" width="250" height="95" rx="22" fill="white"/><text x="807" y="280" text-anchor="middle">Decizia</text><text x="807" y="308" text-anchor="middle" fill="#5a6b80" font-size="16">responsabilitate • predicție</text></g>
  </g>
</svg>